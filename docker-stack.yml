services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: aredl
    ports:
      - "${API_DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    secrets:
      - postgres_user
      - postgres_password
    deploy:
      restart_policy:
        condition: any
        delay: 5s
    networks:
      api_net:
        aliases:
          - "${DB_ALIAS:-db}"

  api:
    image: ghcr.io/all-rated-extreme-demon-list/aredl_backend_api:${COMMIT_HASH:-latest}
    ports:
      - "${API_HOST}:${API_PORT}:${API_PORT}"
    deploy:
      update_config:
            order: start-first
            failure_action: rollback
            delay: 10s
      rollback_config:
          parallelism: 1
          delay: 10s
      restart_policy:
          condition: any
          delay: 5s
    environment:
      HOST: "0.0.0.0"
      PORT: ${API_PORT}
      DOCS_API_SERVER: ${DOCS_API_SERVER}
      
      PEMONLIST_API_URL: https://pemonlist.com/api/player

      JWT_SECRET: /run/secrets/jwt_secret

      POSTGRES_USER: /run/secrets/postgres_user
      POSTGRES_PASSWORD: /run/secrets/postgres_password

      
      DISCORD_BOT_TOKEN: /run/secrets/discord_bot_token

      AUTH_CALLBACK_ALLOWED_DOMAINS: /run/secrets/auth_callback_allowed_domains
      AUTH_CALLBACK_ALLOW_LOCALHOST: ${AUTH_CALLBACK_ALLOW_LOCALHOST}

      MATVIEWS_REFRESH_SCHEDULE: /run/secrets/matviews_refresh_schedule
      LEVEL_DATA_REFRESH_SCHEDULE: /run/secrets/level_data_refresh_schedule
      DISCORD_AVATARS_REFRESH_SCHEDULE: /run/secrets/discord_avatars_refresh_schedule
      DATA_CLEANER_SCHEDULE: /run/secrets/data_cleaner_schedule
      RECURRING_SHIFTS_SCHEDULE: /run/secrets/recurring_shifts_schedule
      PATREON_SYNC_SCHEDULE: /run/secrets/patreon_sync_schedule

      EDEL_SHEET_ID: /run/secrets/edel_sheet_id
      NLW_SHEET_ID: /run/secrets/nlw_sheet_id

      OAUTH_TOKEN_ENCRYPTION_KEY: /run/secrets/oauth_token_encryption_key
      OAUTH_RETURN_URI_BASE: /run/secrets/oauth_return_uri_base

      GOOGLE_OAUTH_CLIENT_CONFIG: /run/secrets/google_oauth_client_config
      TWITCH_OAUTH_CLIENT_CONFIG: /run/secrets/twitch_oauth_client_config
      DISCORD_OAUTH_CLIENT_CONFIG: /run/secrets/discord_oauth_client_config
      PATREON_OAUTH_CLIENT_CONFIG: /run/secrets/patreon_oauth_client_config

      PATREON_CAMPAIGN_ID: /run/secrets/patreon_campaign_id

    logging:
      driver: loki
      options:
        loki-url: "http://127.0.0.1:3100/loki/api/v1/push"
        no-file: "true"
        loki-pipeline-stages: |
          - json:
              expressions:
                http_method: 'span."http.method"'
          - labels:
              http_method:
    depends_on:
      - db
    secrets:
      - postgres_user
      - postgres_password
      - jwt_secret
      - discord_oauth_client_config
      - discord_bot_token
      - auth_callback_allowed_domains
      - matviews_refresh_schedule
      - level_data_refresh_schedule
      - recurring_shifts_schedule
      - discord_avatars_refresh_schedule
      - data_cleaner_schedule
      - patreon_sync_schedule
      - edel_sheet_id
      - nlw_sheet_id
      - google_oauth_client_config
      - twitch_oauth_client_config
      - patreon_campaign_id
      - patreon_oauth_client_config
      - oauth_token_encryption_key
      - source: ${OAUTH_RETURN_URI_BASE}
        target: oauth_return_uri_base

    networks:
      - api_net
         
volumes:
  db_data:
  test_db_data:

secrets:
  postgres_user:
    external: true
  postgres_password:
    external: true
  jwt_secret:
    external: true
  auth_callback_allowed_domains:
    external: true
  discord_bot_token:
    external: true
  matviews_refresh_schedule:
    external: true
  level_data_refresh_schedule:
    external: true
  data_cleaner_schedule:
    external: true
  recurring_shifts_schedule:
    external: true
  discord_avatars_refresh_schedule:
    external: true
  patreon_sync_schedule:
    external: true
  edel_sheet_id:
    external: true
  nlw_sheet_id:
    external: true
  google_oauth_client_config:
    external: true
  twitch_oauth_client_config:
    external: true
  discord_oauth_client_config:
    external: true
  patreon_oauth_client_config:
    external: true
  patreon_campaign_id:
    external: true
  oauth_token_encryption_key:
    external: true
  oauth_return_uri_base_prod:
    external: true
  oauth_return_uri_base_dev:
    external: true
networks:
  api_net:
    name: ${API_NET:-api_net}
    external: true

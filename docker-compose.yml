services:
  db:
    container_name: postgres-db
    image: postgres:14
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: aredl
    ports:
      - "${API_DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    command:
    - "postgres"
    - "-c"
    - "shared_preload_libraries=pg_stat_statements"
    - "-c"
    - "pg_stat_statements.track=top"
    - "-c"
    - "pg_stat_statements.max=5000"

  api:
    container_name: api
    build:
      context: .
      args:
        BUILD_PROFILE: ${BUILD_PROFILE:-debug}
    restart: always
    ports:
      - "${API_HOST}:${API_PORT}:${API_PORT}"
    environment:
      HOST: "0.0.0.0"
      PORT: ${API_PORT}
      DOCS_API_SERVER: ${DOCS_API_SERVER}
      
      PEMONLIST_API_URL: https://pemonlist.com/api/player

      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}

      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}

      AUTH_CALLBACK_ALLOWED_DOMAINS: ${AUTH_CALLBACK_ALLOWED_DOMAINS}
      OAUTH_RETURN_URI_BASE: ${OAUTH_RETURN_URI_BASE}

      MATVIEWS_REFRESH_SCHEDULE: ${MATVIEWS_REFRESH_SCHEDULE}
      LEVEL_DATA_REFRESH_SCHEDULE: ${LEVEL_DATA_REFRESH_SCHEDULE}
      DISCORD_AVATARS_REFRESH_SCHEDULE: ${DISCORD_AVATARS_REFRESH_SCHEDULE}
      DATA_CLEANER_SCHEDULE: ${DATA_CLEANER_SCHEDULE}
      RECURRING_SHIFTS_SCHEDULE: ${RECURRING_SHIFTS_SCHEDULE}
      PATREON_SYNC_SCHEDULE: ${PATREON_SYNC_SCHEDULE}

      EDEL_SHEET_ID: ${EDEL_SHEET_ID}
      NLW_SHEET_ID: ${NLW_SHEET_ID}

      DISCORD_OAUTH_CLIENT_CONFIG: ${DISCORD_OAUTH_CLIENT_CONFIG}
      GOOGLE_OAUTH_CLIENT_CONFIG: ${GOOGLE_OAUTH_CLIENT_CONFIG}
      TWITCH_OAUTH_CLIENT_CONFIG: ${TWITCH_OAUTH_CLIENT_CONFIG}
      PATREON_OAUTH_CLIENT_CONFIG: ${PATREON_OAUTH_CLIENT_CONFIG}

      OAUTH_TOKEN_ENCRYPTION_KEY: ${OAUTH_TOKEN_ENCRYPTION_KEY}
      
      PATREON_CAMPAIGN_ID: ${PATREON_CAMPAIGN_ID}

    depends_on:
      - db

volumes:
  db_data:
  test_db_data:
